<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="#08080c"/>
  <rect width="30" height="30" x="1" y="1" rx="5" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.3"/>
  <!-- NR monogram -->
  <text x="4" y="22" font-family="'Arial Black',sans-serif" font-weight="900" font-size="14" fill="#e8e8ed" filter="url(#glow)">NR</text>
  <!-- Accent dot -->
  <circle cx="27" cy="20" r="2.5" fill="url(#g)"/>
  <circle cx="27" cy="20" r="1.2" fill="#fff" opacity="0.6"/>
</svg>
