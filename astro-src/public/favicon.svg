<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="60%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#09090f"/>

  <!-- Subtle gradient border -->
  <rect width="30" height="30" x="1" y="1" rx="6"
        fill="none" stroke="url(#border)" stroke-width="1"/>

  <!-- "N" letter with gradient glow -->
  <text
    x="16" y="23"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="20"
    text-anchor="middle"
    fill="url(#grad)"
    filter="url(#glow)"
  >N</text>

  <!-- Tiny sparkle dot top-right -->
  <circle cx="26" cy="6" r="2" fill="#a855f7" opacity="0.9"/>
  <circle cx="26" cy="6" r="1" fill="#ffffff" opacity="0.7"/>
</svg>
