<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Paper background — matches work zone #f5f0e8 -->
  <rect width="32" height="32" rx="6" fill="#f5f0e8"/>
  <!-- Ink border — thick manga-panel style, matching --ink #0d0d0d -->
  <rect width="30" height="30" x="1" y="1" rx="5" fill="none" stroke="#0d0d0d" stroke-width="2.2"/>

  <!-- "NR" — ink black, Arial Black, tight tracking — matches .work-nav__logo -->
  <text
    x="5" y="22"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-weight="900"
    font-size="15"
    fill="#0d0d0d"
    letter-spacing="-0.8"
  >NR</text>

  <!-- "." — indigo, matches .work-nav__dot { color: #6366f1 } -->
  <text
    x="25" y="22.5"
    font-family="'Arial Black',Arial,sans-serif"
    font-weight="900"
    font-size="17"
    fill="#6366f1"
  >.</text>

  <!-- Thin accent underline — manga panel flavour -->
  <rect x="4" y="25.5" width="24" height="1.8" rx="0.9" fill="#e63946" opacity="0.75"/>
</svg>
