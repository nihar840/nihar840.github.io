<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0f0f1e"/>
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg-grad)"/>
  <!-- Subtle gradient border -->
  <rect width="30" height="30" x="1" y="1" rx="6" fill="none" stroke="url(#border-grad)" stroke-width="0.9"/>

  <!-- "NR" text — white, bold, matching header__logo style -->
  <text
    x="14.5" y="21"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="13"
    text-anchor="middle"
    fill="#f1f5f9"
    letter-spacing="-0.5"
    filter="url(#glow)"
  >NR</text>

  <!-- Indigo dot — matching header__logo-dot color #6366f1 -->
  <circle cx="24" cy="22" r="2.4" fill="#6366f1"/>
  <!-- Inner dot highlight -->
  <circle cx="23.2" cy="21.2" r="0.9" fill="#c7d2fe" opacity="0.9"/>
</svg>
