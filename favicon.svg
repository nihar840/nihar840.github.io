<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c14"/>
      <stop offset="100%" stop-color="#12121e"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect width="30" height="30" x="1" y="1" rx="6" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.5"/>
  <!-- N letter — bold, gradient filled -->
  <text x="2" y="23" font-family="'Arial Black','Segoe UI Black',sans-serif" font-weight="900" font-size="18" fill="url(#g)" filter="url(#glow)">N</text>
  <!-- R letter — slightly overlapping, lighter -->
  <text x="14" y="23" font-family="'Arial Black','Segoe UI Black',sans-serif" font-weight="900" font-size="18" fill="#e8e8ed" filter="url(#glow)">R</text>
  <!-- Dot accent -->
  <circle cx="28" cy="7" r="2" fill="#f59e0b" opacity="0.9"/>
  <circle cx="28" cy="7" r="0.8" fill="#fff" opacity="0.8"/>
</svg>
